
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>

    <div id="app">
        <h1> THIS IS MY APP USING SSO FROM ANOTHER SITE</h1>
    </div>
    <div class="user-profile-info" id="SD-USER-META">
        CUST ID:
    </div>
    <script>
     
        document.addEventListener("DOMContentLoaded", async function () {

            let currentUser = null;
            const urlParams = new URLSearchParams(window.location.hash.replace('#', '?'));
            const code = urlParams.get("code");

            const token = localStorage.getItem("auth_token");

            if (token) {
                return loadApp();
            }
            if (!code) {
                document.body.innerHTML = "Unauthorized access";
                return;
            }
            try {
                const res = await fetch("https://users.vividsol.in/api/Auth/exchangecode", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code })
                });

                if (!res.ok) {
                    document.body.innerHTML = "Invalid or expired session";
                    return;
                }

                const data = await res.json();

                // Store token
                localStorage.setItem("auth_token", data.token);

                // Clean URL (important)
                history.replaceState(null, "", "/");

                loadApp();
                initAuth();

            } catch (e) {
                document.body.innerHTML = "Authentication failed";
            }
        });

        function loadApp() {
            document.getElementById("app").style.display = "block";
        }

        async function initAuth() {
            currentUser = await loadUser();
            console.log(currentUser);
            document.getElementById('SD-USER-META').innerHTML = currentUser;
        }

        async function loadUser() {

            const token = localStorage.getItem("auth_token");

            if (!token) {
                document.body.innerHTML = "Unauthorized";
                return;
            }

            const res = await fetch("https://users.vividsol.in/api/Auth/GetMe", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) {
                document.body.innerHTML = "Session expired";
                return;
            }

            const data = await res.json();

            // Store in constant (runtime use)

            const userId = data.userId;
            console.log("Logged in user:", userId);
            document.getElementById("app").style.display = "block";

            return userId;
  
        }
    </script>
</body>


</html>
