<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>User Dashboard</title>
</head>
<body>

    <style>
        :root {
            --primary: #0d6efd;
            --danger: #dc3545;
            --gray: #6c757d;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
        }

        /* Navbar */
        .navbar {
            background: #212529;
            color: white;
            padding: 1rem;
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #dee2e6;
        }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--gray);
            background: transparent;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Status Indicators */
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .bg-success {
            background: #d1e7dd;
            color: #0f5132;
        }

        .bg-warning {
            background: #fff3cd;
            color: #664d03;
        }
    </style>

    <nav class="navbar">
        <strong>My New App</strong>
        <div id="session-status">
            <span class="badge bg-success" id="status-text">Session Active</span>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Dashboard</h2>
            <p>You are currently logged in. Your session will automatically refresh as long as you are active.</p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <div id="SD-USER-META" class="bg-dark text-white">
            </div>
            <div id="SD-EXPIRY-META" class="bg-info">
            </div>
            <div id="SD-ERROR-META" class="bg-warning text-white">
            </div>

            <div style="display: flex; padding:15px; justify-content: space-between; align-items: center;">
                <button onclick="SessionManager.logout()" class="btn btn-outline">Logout Now</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const INACTIVITY_LIMIT = 5 * 60 * 1000;   // 5 Minutes
        const REFRESH_THRESHOLD = 1 * 60 * 1000;   // 1 Minutes before expiry
        const CHECK_INTERVAL = 30000;              // Run check every 30 seconds

        async function loadUser() {

            const token = localStorage.getItem("auth_token");

            if (!token) {
                document.getElementById('SD-ERROR-META').innerHTML = "Unauthorized";
                return;
            }

            const res = await fetch("https://users.vividsol.in/api/Auth/GetMe", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) {
                document.body.innerHTML = "Session expired";
                return;
            }

            const data = await res.json();

            const userId = data.userId;
            console.log("Logged in user:", userId);
            document.getElementById('SD-USER-META').innerHTML = userId;

            return userId;
        }

        function getTokenExpirationDate(token) {
            try {
                // 1. Split the token and get the payload (middle part)
                const base64Url = token.split('.')[1];

                // 2. Replace characters not supported by atob
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

                // 3. Decode the string and parse the JSON
                const payload = JSON.parse(window.atob(base64));

                // 4. Check if the exp claim exists
                if (!payload.exp) return null;

                // Convert seconds to milliseconds
                return new Date(payload.exp * 1000);
            } catch (error) {
                console.error("Invalid token format", error);
                return null;
            }
        }

        const SessionManager = {

            timer: null,

            init() {
                this.setupActivityListeners();
                this.startHeartbeat();
                this.recordActivity();
            },

            setupActivityListeners() {
                const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
                events.forEach(e =>
                    window.addEventListener(e, () => this.recordActivity())
                );
            },

            recordActivity() {
                localStorage.setItem('lastActive', Date.now().toString());
            },

            startHeartbeat() {
                this.timer = setInterval(() => this.checkSession(), CHECK_INTERVAL);
            },

            async checkSession() {
                const token = localStorage.getItem('auth_token');
                const lastActive = parseInt(localStorage.getItem('lastActive') || "0");
                const now = Date.now();

                if (!token) return;

                if (now - lastActive > INACTIVITY_LIMIT) {
                    console.log("Session expired due to inactivity.");
                    this.logout();
                    return;
                }

                try {
                    const expiryDate = getTokenExpirationDate(token);
                    const timeUntilExpiry = expiryDate - now;

                    if (timeUntilExpiry < REFRESH_THRESHOLD) {
                        console.log("Token expiring soon, attempting refresh...");
                        await this.performRefresh();
                    }
                } catch (err) {
                    console.error("Session check failed:", err);
                    this.logout();
                }
            },

            async performRefresh() {
                try {

                    const refreshToken = localStorage.getItem("refresh_token");
                    const authToken = localStorage.getItem("auth_token");

                    if (!refreshToken) return false;
                    if (!authToken) return false;

                    const res = await fetch("https://users.vividsol.in/api/auth/Refresh", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ authToken, refreshToken })
                    });

                    if (!res.ok) {
                        console.log("failed refresh")
                        return false;
                    }

                    const data = await res.json();

                    if (data.authToken) {
                        localStorage.setItem("auth_token", data.authToken);
                        const expiryDate = getTokenExpirationDate(data.authToken);
                        document.getElementById('SD-EXPIRY-META').innerHTML = "Refreshed - " + expiryDate;
                     }

                    if (data.refreshToken) {
                        localStorage.setItem("refresh_token", data.refreshToken);
                    }

                } catch (error) {
                    this.logout();
                }
            },

            logout() {
                clearInterval(this.timer);
                localStorage.clear();
                window.location.href = "https://users.vividsol.in/Logout";
            }
        };

        document.addEventListener("DOMContentLoaded", async function () {

            let currentUser = null;
            const urlParams = new URLSearchParams(window.location.hash.replace('#', '?'));
            const code = urlParams.get("code");

            let token = localStorage.getItem("auth_token");

            history.replaceState(null, "", "/");
            window.history.replaceState({}, document.title, "/");
            document.title = "User Dashboard";

            token = await exchangeCodeForToken(code);

            SessionManager.init();

            currentUser = await loadUser();
            console.log(currentUser);
            document.getElementById('SD-USER-META').innerHTML = currentUser;

            const expiryDate = getTokenExpirationDate(token);
            document.getElementById('SD-EXPIRY-META').innerHTML = expiryDate;

        });

        function isTokenExpired(token) {
            try {
                const expiryDate = getTokenExpirationDate(token);
                return expiryDate < Date.now();
            } catch (e) {
                return true;
            }
        }

        async function exchangeCodeForToken(code) {
            try {
                const res = await fetch("https://users.vividsol.in/api/Auth/exchangecode", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code })
                });

                if (res.status === 401) {
                    localStorage.removeItem("auth_token");
                    window.location.href = "https://users.vividsol.in/Logout";
                    return;
                }

                if (!res.ok) {
                    document.getElementById('SD-ERROR-META').innerHTML = "Invalid or expired session";
                    return;
                }

                const data = await res.json();

                // Store token
                localStorage.setItem("auth_token", data.authToken);
                localStorage.setItem("refresh_token", data.refreshToken);

                return data.authToken;

            } catch (e) {
                document.getElementById('SD-ERROR-META').innerHTML = "Authentication failed";
            }
        }
    </script>

</body>
</html>
