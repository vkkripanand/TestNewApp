<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>

    <div id="app" style="display: block;">
        <h1> THIS IS MY APP USING SSO FROM ANOTHER SITE</h1>
    </div>
    <div class="user-profile-info" id="SD-USER-META">
        CUST ID:
    </div>
    <script>

        let inactivityTimer;
        let refreshTimer;

        const INACTIVITY_LIMIT = 2 * 60 * 1000; // 15 minutes
        const REFRESH_THRESHOLD = 1 * 60 * 1000; // 10 minutes

        function startAuthTimers() {
            // 1. Start the Refresh Token timer
            scheduleTokenRefresh();

            // 2. Start the Inactivity timer
            resetInactivityTimer();

            // 3. Listen for user activity
            const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
            activityEvents.forEach(event => {
                window.addEventListener(event, resetInactivityTimer);
            });
        }

        function getTokenExpirationDate(token) {
            try {
                // 1. Split the token and get the payload (middle part)
                const base64Url = token.split('.')[1];

                // 2. Replace characters not supported by atob
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

                // 3. Decode the string and parse the JSON
                const payload = JSON.parse(window.atob(base64));

                // 4. Check if the exp claim exists
                if (!payload.exp) return null;

                // Convert seconds to milliseconds
                return new Date(payload.exp * 1000);
            } catch (error) {
                console.error("Invalid token format", error);
                return null;
            }
        }

         function scheduleTokenRefresh() {
            // Clear existing if any
            if (refreshTimer) clearTimeout(refreshTimer);

            refreshTimer = setTimeout(async () => {
                console.log("Attempting to refresh token...");
                try {
                    await refreshTokenApiCall();
                    // Re-schedule the next refresh after success
                    scheduleTokenRefresh();
                } catch (err) {
                    console.error("Refresh failed", err);
                    logout();
                }
            }, REFRESH_THRESHOLD);
        }

        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);

            inactivityTimer = setTimeout(() => {
                console.warn("User inactive for 15 minutes. Logging out.");
                logout();
            }, INACTIVITY_LIMIT);
        }

       async function refreshTokenApiCall() {
            console.log("User active & token aging. Refreshing...");
            try {
                const refreshToken = localStorage.getItem("refresh_token");
                const authToken = localStorage.getItem("auth_token");

                if (!refreshToken) return false;

                const res = await fetch("https://users.vividsol.in/api/auth/Refresh", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ authToken, refreshToken })
                });

                if (!res.ok) {
                    console.log("failed refresh")
                    return false;
                }

                const data = await res.json();

                localStorage.setItem("auth_token", data.authToken);
                localStorage.setItem("refresh_token", data.refreshToken);

                return true;
            } catch (err) {
                console.error("Refresh failed", err);
            }
        }

        function forceLogout() {
            localStorage.clear();
            window.location.href = 'https://users.vividsol.in/SDRegistration';
        }

        //// Attach listeners
        //['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(event => {
        //    // Use a simple debounce or throttle here if performance is an issue
        //    document.addEventListener(event, handleActivity, true);
        //});

        document.addEventListener("DOMContentLoaded", async function () {

            // Initial start
            //handleActivity();

            startAuthTimers();

            localStorage.removeItem("auth_token");

            let currentUser = null;
            const urlParams = new URLSearchParams(window.location.hash.replace('#', '?'));
            const code = urlParams.get("code");

            const token = localStorage.getItem("auth_token");

            if (!code) {
                document.body.innerHTML = "Unauthorized access";
                return;
            }
            try {
                const res = await fetch("https://users.vividsol.in/api/Auth/exchangecode", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code })
                });

                if (res.status === 401) {
                    // session expired
                    localStorage.removeItem("auth_token");
                    window.location.href = "https://users.vividsol.in/SDRegistration";
                    return;
                }

                if (!res.ok) {
                    document.body.innerHTML = "Invalid or expired session";
                    return;
                }

                const data = await res.json();

                // Store token
                localStorage.setItem("auth_token", data.authToken);
                localStorage.setItem("refresh_token", data.refreshToken);

                // Clean URL (important)
                history.replaceState(null, "", "/");

                loadApp();
                initAuth();
                const expiryDate = getTokenExpirationDate(data.authToken);
                console.log(`Token expires at: ${expiryDate}`);

            } catch (e) {
                document.body.innerHTML = "Authentication failed";
            }
        });

        function loadApp() {
            document.getElementById("app").style.display = "block";
        }

        async function initAuth() {
            currentUser = await loadUser();
            console.log(currentUser);
            document.getElementById('SD-USER-META').innerHTML = currentUser;
        }
  
        async function loadUser() {

            const token = localStorage.getItem("auth_token");

            if (!token) {
                document.body.innerHTML = "Unauthorized";
                return;
            }

            const res = await fetch("https://users.vividsol.in/api/Auth/GetMe", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) {
                document.body.innerHTML = "Session expired";
                return;
            }

            const data = await res.json();

            // Store in constant (runtime use)

            const userId = data.userId;
            console.log("Logged in user:", userId);
            document.getElementById("app").style.display = "block";

            return userId;
  
        }

    </script>
</body>


</html>
